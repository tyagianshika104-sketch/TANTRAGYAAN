version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./firebase_credentials.json:/app/firebase_credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:5000/api/health'); exit(0 if r.ok else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
